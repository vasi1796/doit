version: "3.9"

networks:
  doit:
    driver: bridge

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
  rabbitmq_data:
  web_dist:

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 16 — event store + read models
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: doit-postgres
    restart: unless-stopped
    networks:
      - doit
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Go API — REST + WebSocket on :8080
  # ---------------------------------------------------------------------------
  doit-api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: doit-api
    restart: unless-stopped
    networks:
      - doit
    ports:
      - "127.0.0.1:8080:8080"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      PORT: "8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    stop_grace_period: 20s

  # ---------------------------------------------------------------------------
  # Web Build — builds React frontend, outputs dist to shared volume
  # ---------------------------------------------------------------------------
  web-build:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: doit-web-build
    volumes:
      - web_dist:/out
    entrypoint: ["cp", "-r", "/app/dist/.", "/out/"]

  # ---------------------------------------------------------------------------
  # Caddy — TLS termination, reverse proxy, PWA static assets
  # ---------------------------------------------------------------------------
  caddy:
    image: caddy:2-alpine
    container_name: doit-caddy
    restart: unless-stopped
    networks:
      - doit
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - web_dist:/srv/web:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      web-build:
        condition: service_completed_successfully
      doit-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ---------------------------------------------------------------------------
  # RabbitMQ — event broker for async projections
  # ---------------------------------------------------------------------------
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: doit-rabbitmq
    restart: unless-stopped
    networks:
      - doit
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-doit}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-changeme}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Projection Worker — consumes all events, updates read models
  # ---------------------------------------------------------------------------
  worker:
    build:
      context: ./api
      dockerfile: Dockerfile
      args:
        CMD_PATH: cmd/worker
    container_name: doit-worker
    restart: unless-stopped
    networks:
      - doit
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672/
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Recurring Worker — creates next task occurrence on completion
  # ---------------------------------------------------------------------------
  worker-recurring:
    build:
      context: ./api
      dockerfile: Dockerfile
      args:
        CMD_PATH: cmd/worker-recurring
    container_name: doit-worker-recurring
    restart: unless-stopped
    networks:
      - doit
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672/
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Reminder Worker — push notifications for tasks due today
  # ---------------------------------------------------------------------------
  worker-reminder:
    build:
      context: ./api
      dockerfile: Dockerfile
      args:
        CMD_PATH: cmd/worker-reminder
    container_name: doit-worker-reminder
    restart: unless-stopped
    networks:
      - doit
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_SUBJECT: ${VAPID_SUBJECT}
      REMINDER_HOUR: "8"
      REMINDER_TZ: "UTC"
    depends_on:
      postgres:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Deploy Webhook — receives GitHub webhooks, runs docker compose rebuild
  # ---------------------------------------------------------------------------
  deployer:
    build:
      context: ./deploy
      dockerfile: Dockerfile
    container_name: doit-deployer
    restart: unless-stopped
    networks:
      - doit
    environment:
      DEPLOY_WEBHOOK_SECRET: ${DEPLOY_WEBHOOK_SECRET:-}
      REPO_DIR: /repo
      WEBHOOK_PORT: "9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/repo:rw
