name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: doit
          POSTGRES_PASSWORD: changeme
          POSTGRES_DB: doit
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U doit -d doit"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: api/go.mod
          cache-dependency-path: api/go.sum

      - name: Go vet
        working-directory: api
        run: go vet ./...

      - name: Build
        working-directory: api
        run: go build ./...

      - name: Unit tests
        working-directory: api
        run: go test ./... -race -count=1

      - name: Run migrations
        working-directory: api
        env:
          DATABASE_URL: postgres://doit:changeme@localhost:5432/doit?sslmode=disable
        run: go run ./cmd/migrate up

      - name: Integration tests
        working-directory: api
        env:
          TEST_DATABASE_URL: postgres://doit:changeme@localhost:5432/doit?sslmode=disable
        run: go test -tags integration ./... -race -count=1
