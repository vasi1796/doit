name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  go:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: doit
          POSTGRES_PASSWORD: changeme
          POSTGRES_DB: doit
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U doit -d doit"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      rabbitmq:
        image: rabbitmq:3.13-management-alpine
        env:
          RABBITMQ_DEFAULT_USER: doit
          RABBITMQ_DEFAULT_PASS: changeme
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: api/go.mod
          cache-dependency-path: api/go.sum

      - name: Go vet
        working-directory: api
        run: go vet ./...

      - name: Build
        working-directory: api
        run: go build ./...

      - name: Unit tests
        working-directory: api
        run: go test ./... -race -count=1

      - name: Run migrations
        working-directory: api
        env:
          DATABASE_URL: postgres://doit:changeme@localhost:5432/doit?sslmode=disable
        run: go run ./cmd/migrate up

      - name: Integration tests
        working-directory: api
        env:
          TEST_DATABASE_URL: postgres://doit:changeme@localhost:5432/doit?sslmode=disable
          TEST_RABBITMQ_URL: amqp://doit:changeme@localhost:5672/
        run: go test -tags integration ./... -race -count=1

  frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Lint
        working-directory: web
        run: npm run lint

      - name: Check generated types are in sync
        working-directory: web
        run: npm run check:types

      - name: Build
        working-directory: web
        run: npm run build

  e2e:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Install Playwright WebKit
        working-directory: web
        run: npx playwright install webkit --with-deps

      - name: Build
        working-directory: web
        run: npm run build

      - name: Accessibility tests
        working-directory: web
        run: npm run test:a11y

      - name: Visual regression tests
        working-directory: web
        run: npm run test:visual
